server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: course-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/courses/**
          filters:
            - StripPrefix=1

        - id: student-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/students/**
          filters:
            - StripPrefix=1
